<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>POS</title>
  <style>
    /* ---- Theme tokens (per-tenant branding will override these later) ---- */
    :root {
      --brand:        #b5471f;   /* primary / brand */
      --brand-dark:   #8f3414;
      --accent:       #1f7a5a;
      --bg:           #f5f1ea;
      --surface:      #ffffff;
      --ink:          #2a2320;
      --ink-soft:     #6b625b;
      --line:         #e6ded3;
      --ok:           #1f7a5a;
      --warn:         #c9851a;
      --danger:       #c0392b;
      --veg:          #2e7d32;
      --nonveg:       #c0392b;
      --egg:          #c9851a;
      --radius:       12px;
      --shadow:       0 1px 3px rgba(0,0,0,.08), 0 4px 14px rgba(0,0,0,.05);
      --font:         -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body, #root { height: 100%; margin: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--ink); font-size: 15px; }
    button { font-family: inherit; cursor: pointer; }
    input, select { font-family: inherit; font-size: 16px; }

    .btn { border: none; border-radius: 10px; padding: 11px 16px; font-weight: 600; font-size: 15px;
           background: var(--brand); color: #fff; transition: filter .12s; }
    .btn:hover { filter: brightness(1.05); }
    .btn:active { filter: brightness(.94); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn.ghost { background: transparent; color: var(--ink); border: 1px solid var(--line); }
    .btn.accent { background: var(--accent); }
    .btn.danger { background: var(--danger); }
    .btn.sm { padding: 7px 11px; font-size: 13px; border-radius: 8px; }

    /* ---- Login ---- */
    .login-wrap { height: 100%; display: grid; place-items: center; padding: 20px; }
    .login-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow);
                  width: 100%; max-width: 360px; padding: 32px 28px; }
    .login-card h1 { margin: 0 0 4px; font-size: 22px; color: var(--brand); }
    .login-card p  { margin: 0 0 24px; color: var(--ink-soft); font-size: 14px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; color: var(--ink-soft); margin-bottom: 5px; }
    .field input { width: 100%; padding: 11px 12px; border: 1px solid var(--line); border-radius: 10px; }
    .field input:focus { outline: none; border-color: var(--brand); }
    .err { background: #fdecea; color: var(--danger); padding: 9px 12px; border-radius: 8px;
           font-size: 13px; margin-bottom: 14px; }

    /* ---- Shell ---- */
    .shell { height: 100%; display: flex; flex-direction: column; }
    .topbar { display: flex; align-items: center; gap: 14px; padding: 10px 16px; background: var(--surface);
              border-bottom: 1px solid var(--line); }
    .topbar .brand { font-weight: 800; color: var(--brand); font-size: 17px; }
    .topbar .tenant { color: var(--ink-soft); font-size: 13px; }
    .topbar .spacer { flex: 1; }
    .nav { display: flex; gap: 4px; }
    .nav button { background: transparent; border: none; padding: 8px 13px; border-radius: 8px;
                  font-weight: 600; color: var(--ink-soft); font-size: 14px; }
    .nav button.active { background: var(--brand); color: #fff; }
    .who { font-size: 13px; color: var(--ink-soft); text-align: right; line-height: 1.3; }
    .who b { color: var(--ink); display: block; text-transform: capitalize; }

    .main { flex: 1; overflow: hidden; }

    /* ---- Cashier 3-pane ---- */
    .cashier { height: 100%; display: grid; grid-template-columns: 200px 1fr 320px; }
    .pane { overflow-y: auto; padding: 14px; }
    .pane.tables { border-right: 1px solid var(--line); background: #faf7f1; }
    .pane.menu   { border-right: 1px solid var(--line); }
    .pane.bill   { background: var(--surface); display: flex; flex-direction: column; padding: 0; }
    .pane h3 { margin: 2px 0 12px; font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: var(--ink-soft); }

    .table-btn { width: 100%; text-align: left; margin-bottom: 7px; padding: 11px 12px; border-radius: 10px;
                 border: 1px solid var(--line); background: var(--surface); font-weight: 600; }
    .table-btn .seats { font-weight: 400; color: var(--ink-soft); font-size: 12px; }
    .table-btn.occupied { border-color: var(--warn); background: #fff7e8; }
    .table-btn.sel { border-color: var(--brand); box-shadow: 0 0 0 2px rgba(181,71,31,.18); }

    .cat { margin-bottom: 18px; }
    .cat h4 { margin: 0 0 9px; font-size: 14px; color: var(--brand-dark); }
    .menu-tools { position: sticky; top: -14px; background: var(--surface); padding: 10px 0; margin: -14px 0 10px; z-index: 5; border-bottom: 1px solid var(--line); }
    .menu-search { width: 100%; padding: 9px 12px; border: 1px solid var(--line); border-radius: 10px; margin-bottom: 8px; }
    .cat-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; }
    .chip { white-space: nowrap; border: 1px solid var(--line); background: var(--surface); color: var(--ink-soft); padding: 6px 12px; border-radius: 20px; font-weight: 600; font-size: 13px; }
    .chip.on { background: var(--brand); color: #fff; border-color: var(--brand); }
    .items { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
    .item { border: 1px solid var(--line); border-radius: 10px; padding: 10px; background: var(--surface);
            display: flex; flex-direction: column; gap: 7px; }
    .item .nm { font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 6px; }
    .dot { width: 9px; height: 9px; border-radius: 2px; flex: none; border: 1.5px solid; }
    .dot.veg { border-color: var(--veg); background: var(--veg); }
    .dot.nonveg { border-color: var(--nonveg); background: var(--nonveg); }
    .dot.egg { border-color: var(--egg); background: var(--egg); }
    .item .add-row { display: flex; gap: 6px; }
    .item .price { color: var(--ink-soft); font-size: 13px; margin-top: -2px; }

    .bill-head { padding: 14px 16px; border-bottom: 1px solid var(--line); }
    .bill-head .t { font-weight: 700; font-size: 16px; }
    .bill-head .s { color: var(--ink-soft); font-size: 13px; }
    .lines { flex: 1; overflow-y: auto; padding: 8px 16px; }
    .empty { color: var(--ink-soft); text-align: center; padding: 40px 10px; font-size: 14px; }
    .line { display: flex; align-items: center; gap: 8px; padding: 9px 0; border-bottom: 1px dashed var(--line); }
    .line .ln { flex: 1; }
    .line .ln .nm { font-weight: 600; font-size: 14px; }
    .line .ln .meta { color: var(--ink-soft); font-size: 12px; }
    .qty { display: flex; align-items: center; gap: 6px; }
    .qty button { width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--line);
                  background: var(--surface); font-weight: 700; font-size: 15px; line-height: 1; }
    .qty span { min-width: 18px; text-align: center; font-weight: 600; }
    .line .lt { min-width: 64px; text-align: right; font-weight: 600; font-size: 14px; }
    .bill-foot { border-top: 1px solid var(--line); padding: 14px 16px; }
    .row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 14px; }
    .row.total { font-size: 19px; font-weight: 800; margin: 8px 0 2px; }
    .row .muted { color: var(--ink-soft); }

    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: grid; place-items: center; z-index: 50; padding: 16px; }
    .modal { background: var(--surface); border-radius: var(--radius); padding: 22px; width: 100%; max-width: 360px; box-shadow: var(--shadow); }
    .modal h3 { margin: 0 0 14px; }
    .pay-methods { display: flex; gap: 8px; margin-bottom: 14px; }
    .pay-methods button { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--line);
                          background: var(--surface); font-weight: 600; text-transform: capitalize; }
    .pay-methods button.sel { border-color: var(--brand); background: #fdeee8; color: var(--brand-dark); }

    /* ---- Kitchen ---- */
    .kds { height: 100%; overflow-y: auto; padding: 16px; }
    .kds-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
    .ticket { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
              border-top: 4px solid var(--brand); }
    .ticket.preparing { border-top-color: var(--warn); }
    .ticket.ready { border-top-color: var(--ok); }
    .ticket .th { padding: 11px 14px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
    .ticket .th b { font-size: 15px; }
    .ticket .th .age { font-size: 12px; color: var(--ink-soft); }
    .ticket .tl { padding: 10px 14px; }
    .ticket .tl .li { display: flex; justify-content: space-between; padding: 4px 0; font-size: 14px; }
    .ticket .tl .li .q { font-weight: 700; color: var(--brand-dark); }
    .ticket .ta { display: flex; gap: 7px; padding: 0 14px 13px; }
    .badge { font-size: 11px; text-transform: uppercase; letter-spacing: .03em; padding: 2px 8px; border-radius: 20px; font-weight: 700; }
    .badge.new { background: #fdeee8; color: var(--brand-dark); }
    .badge.preparing { background: #fff3df; color: var(--warn); }
    .badge.ready { background: #e3f3ec; color: var(--ok); }

    .center-msg { height: 100%; display: grid; place-items: center; color: var(--ink-soft); }

    @media (max-width: 820px) {
      .cashier { grid-template-columns: 1fr; grid-template-rows: auto auto 1fr; }
      .pane.tables { display: flex; gap: 7px; overflow-x: auto; }
      .pane.tables h3 { display: none; }
      .table-btn { min-width: 120px; margin: 0; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/qrcode-generator@1.4.4/qrcode.js"></script>
  <script type="module">
    import htm from 'https://unpkg.com/htm?module';
    const html = htm.bind(React.createElement);
    const { useState, useEffect, useCallback, useRef } = React;

    // ---------------- auth + api ----------------
    const KEY = 'pos.auth';
    const loadAuth = () => { try { return JSON.parse(localStorage.getItem(KEY)); } catch { return null; } };
    const saveAuth = (a) => localStorage.setItem(KEY, JSON.stringify(a));
    const clearAuth = () => localStorage.removeItem(KEY);

    function apiErr(data, status) {
      if (data && typeof data === 'object') {
        if (data.detail) return data.detail;
        const k = Object.keys(data)[0];
        if (k) {
          const v = data[k];
          const msg = Array.isArray(v) ? v[0] : (typeof v === 'string' ? v : JSON.stringify(v));
          return (k === 'non_field_errors' ? '' : (k + ': ')) + msg;
        }
      }
      return 'Request failed (' + status + ')';
    }

    async function api(path, { method = 'GET', body } = {}) {
      const auth = loadAuth();
      const headers = { 'Content-Type': 'application/json' };
      if (auth?.token) headers['Authorization'] = 'Token ' + auth.token;
      const res = await fetch('/api' + path, {
        method, headers, body: body ? JSON.stringify(body) : undefined,
      });
      if (res.status === 401) { clearAuth(); location.reload(); return; }
      const data = res.status === 204 ? null : await res.json().catch(() => null);
      if (!res.ok) throw new Error(apiErr(data, res.status));
      return data;
    }

    // multipart upload (file/photo) — same token auth, no JSON content-type
    async function apiUpload(path, formData) {
      const auth = loadAuth();
      const headers = {};
      if (auth?.token) headers['Authorization'] = 'Token ' + auth.token;
      const res = await fetch('/api' + path, { method: 'POST', headers, body: formData });
      if (res.status === 401) { clearAuth(); location.reload(); return; }
      const data = res.status === 204 ? null : await res.json().catch(() => null);
      if (!res.ok) throw new Error(apiErr(data, res.status));
      return data;
    }

    // download a file (CSV/Excel) with token auth, then trigger a browser save
    async function apiDownload(path, filename) {
      const auth = loadAuth();
      const headers = {};
      if (auth?.token) headers['Authorization'] = 'Token ' + auth.token;
      const res = await fetch('/api' + path, { headers });
      if (!res.ok) { alert('Export failed (' + res.status + ')'); return; }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
    }

    const rupee = (n) => '₹' + Number(n || 0).toFixed(2);
    const FOOD = { veg: 'veg', nonveg: 'nonveg', egg: 'egg' };

    // Build a UPI deep link + QR (data URL) for scan-to-pay. Returns null on
    // error or if the qrcode lib didn't load.
    const upiQrDataUrl = (vpa, name, amount, note) => {
      try {
        if (typeof qrcode === 'undefined' || !vpa) return null;
        const amt = Number(amount);
        const am = isFinite(amt) && amt > 0 ? amt.toFixed(2) : '';
        let uri = 'upi://pay?pa=' + encodeURIComponent(vpa);
        if (name) uri += '&pn=' + encodeURIComponent(name);
        if (am) uri += '&am=' + am;
        uri += '&cu=INR';
        if (note) uri += '&tn=' + encodeURIComponent(note);
        const qr = qrcode(0, 'M'); qr.addData(uri); qr.make();
        return { url: qr.createDataURL(6, 8), uri };
      } catch (e) { return null; }
    };

    // Compose a plain-text bill for WhatsApp, and a wa.me click-to-chat link.
    const buildBillText = (order, tenant) => {
      const name = (tenant && tenant.name) || 'Our cafe';
      const L = [];
      L.push('*' + name + '*');
      L.push('Bill #' + order.id
        + (order.table_name ? ' · ' + order.table_name : '')
        + (order.token != null ? ' · Token ' + order.token : ''));
      L.push('');
      (order.lines || []).forEach(l => {
        L.push(l.qty + ' x ' + l.name_snapshot + (l.is_half ? ' (half)' : '') + '  ' + rupee(l.line_total));
      });
      L.push('');
      if (Number(order.tax_total) > 0) {
        L.push('Subtotal: ' + rupee(order.subtotal));
        L.push('GST: ' + rupee(order.tax_total));
      }
      L.push('Total: ' + rupee(order.total));
      if (Number(order.amount_paid) > 0) L.push('Paid: ' + rupee(order.amount_paid));
      L.push('');
      L.push('Thank you, please visit again!');
      if (tenant && tenant.whatsapp_number) L.push(name + ' · ' + tenant.whatsapp_number);
      return L.join('\n');
    };

    const waLink = (phone, text) => {
      let digits = (phone || '').replace(/\D/g, '');
      if (digits.length === 10) digits = '91' + digits;   // assume India for a bare 10-digit number
      return 'https://wa.me/' + digits + '?text=' + encodeURIComponent(text);
    };

    const tgShareLink = (text) => 'https://t.me/share/url?url=&text=' + encodeURIComponent(text);
    const mailtoLink = (subject, body) => 'mailto:?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);

    // ---- Thermal / receipt printing: render a narrow receipt and print it via
    // the browser to ANY installed printer (USB/Bluetooth thermal shows up as a
    // normal printer). Prints TWO copies in one go: customer + restaurant. ----
    const escapeHtml = (s) => String(s == null ? '' : s).replace(/[&<>"']/g,
      c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

    const receiptHtml = (order, tenant, copyLabel) => {
      const name = (tenant && tenant.name) || 'Cafe';
      const rows = (order.lines || []).map(l =>
        '<tr><td>' + escapeHtml(l.name_snapshot) + (l.is_half ? ' (half)' : '') +
        '</td><td class="c">' + l.qty + '</td><td class="r">' + rupee(l.line_total) + '</td></tr>'
      ).join('');
      const meta = [order.table_name || '', order.token != null ? 'Token ' + order.token : '', 'Bill #' + order.id]
        .filter(Boolean).join('  ·  ');
      const tax = Number(order.tax_total) > 0
        ? '<div class="row"><span>Subtotal</span><span>' + rupee(order.subtotal) + '</span></div>' +
          '<div class="row"><span>GST</span><span>' + rupee(order.tax_total) + '</span></div>'
        : '';
      const paid = Number(order.amount_paid) > 0
        ? '<div class="row"><span>Paid</span><span>' + rupee(order.amount_paid) + '</span></div>' : '';
      const cust = order.customer_phone
        ? '<div class="muted center">Customer: ' + escapeHtml(order.customer_phone) +
          (order.customer_name ? ' · ' + escapeHtml(order.customer_name) : '') + '</div>' : '';
      return '<div class="receipt">' +
        '<div class="center b big">' + escapeHtml(name) + '</div>' +
        (tenant && tenant.whatsapp_number ? '<div class="center muted">' + escapeHtml(tenant.whatsapp_number) + '</div>' : '') +
        (copyLabel ? '<div class="center muted b">[' + copyLabel + ']</div>' : '') +
        '<div class="center muted">' + new Date().toLocaleString() + '</div>' +
        (meta ? '<div class="center muted">' + meta + '</div>' : '') +
        '<div class="hr"></div>' +
        '<table>' + rows + '</table>' +
        '<div class="hr"></div>' + tax +
        '<div class="row b big"><span>Total</span><span>' + rupee(order.total) + '</span></div>' +
        paid + cust +
        '<div class="center muted thanks">Thank you, please visit again!</div>' +
        '</div>';
    };

    const printBill = (order, tenant) => {
      if (!order) return;
      const css =
        '@media print { @page { margin: 0; } }' +
        'body { margin: 0; }' +
        '.receipt { width: 280px; margin: 0 auto; padding: 8px 10px; color: #000;' +
        '  font-family: "Courier New", monospace; font-size: 12px; }' +
        '.receipt .big { font-size: 15px; } .receipt .b { font-weight: 700; }' +
        '.receipt .center { text-align: center; } .receipt .muted { font-size: 11px; }' +
        '.receipt .hr { border-top: 1px dashed #000; margin: 6px 0; }' +
        '.receipt table { width: 100%; border-collapse: collapse; }' +
        '.receipt td { padding: 2px 0; vertical-align: top; font-size: 12px; }' +
        '.receipt td.c { text-align: center; width: 28px; } .receipt td.r { text-align: right; width: 64px; }' +
        '.receipt .row { display: flex; justify-content: space-between; padding: 1px 0; }' +
        '.receipt .thanks { margin-top: 8px; } .cut { border-top: 1px dashed #000; margin: 14px 0; }';
      const body = receiptHtml(order, tenant, 'CUSTOMER COPY') +
        '<div class="cut"></div>' +
        receiptHtml(order, tenant, 'RESTAURANT COPY');
      const frame = document.createElement('iframe');
      frame.style.cssText = 'position:fixed;right:0;bottom:0;width:0;height:0;border:0;';
      document.body.appendChild(frame);
      const doc = frame.contentWindow.document;
      doc.open();
      doc.write('<!doctype html><html><head><meta charset="utf-8"><title>Bill</title><style>' + css + '</style></head><body>' + body + '</body></html>');
      doc.close();
      frame.contentWindow.focus();
      setTimeout(() => {
        try { frame.contentWindow.print(); } catch (e) { alert('Print failed: ' + e.message); }
        setTimeout(() => { try { document.body.removeChild(frame); } catch (e) {} }, 1500);
      }, 300);
    };

    // ---------------- Login ----------------
    function Login({ onLogin }) {
      const [u, setU] = useState(''); const [p, setP] = useState('');
      const [err, setErr] = useState(''); const [busy, setBusy] = useState(false);
      const submit = async () => {
        setErr(''); setBusy(true);
        try {
          const data = await api('/auth/login/', { method: 'POST', body: { username: u, password: p } });
          saveAuth(data); onLogin(data);
        } catch (e) { setErr(e.message); } finally { setBusy(false); }
      };
      return html`
        <div class="login-wrap">
          <div class="login-card">
            <h1>POS</h1>
            <p>Sign in to your restaurant</p>
            ${err && html`<div class="err">${err}</div>`}
            <div class="field"><label>Username</label>
              <input value=${u} onChange=${e => setU(e.target.value)}
                     onKeyDown=${e => e.key === 'Enter' && submit()} autoFocus /></div>
            <div class="field"><label>Password</label>
              <input type="password" value=${p} onChange=${e => setP(e.target.value)}
                     onKeyDown=${e => e.key === 'Enter' && submit()} /></div>
            <button class="btn" style=${{ width: '100%', marginTop: '6px' }}
                    disabled=${busy || !u || !p} onClick=${submit}>
              ${busy ? 'Signing in…' : 'Sign in'}</button>
          </div>
        </div>`;
    }

    // ---------------- Cashier ----------------
    function Cashier() {
      const [tables, setTables] = useState([]);
      const [menu, setMenu] = useState([]);
      const [active, setActive] = useState([]);       // active orders (occupancy + takeaway list)
      const [order, setOrder] = useState(null);       // open order (created) or null
      const [selKind, setSelKind] = useState(null);   // 'table' | 'takeaway' | null
      const [selTable, setSelTable] = useState(null); // table object when selKind==='table'
      const [pay, setPay] = useState(false);
      const [payResult, setPayResult] = useState(null);
      const [tenantInfo, setTenantInfo] = useState(null);
      const [q, setQ] = useState('');
      const [activeCat, setActiveCat] = useState('all');

      const loadBase = useCallback(async () => {
        const [t, m, a, ti] = await Promise.all([api('/tables/'), api('/menu/'), api('/orders/?status=active'), api('/tenant/').catch(() => null)]);
        setTables(t || []); setMenu(m || []); setActive(a || []); if (ti) setTenantInfo(ti);
      }, []);
      useEffect(() => { loadBase(); }, [loadBase]);
      const refreshActive = async () => { try { setActive(await api('/orders/?status=active') || []); } catch {} };

      const takeaways = active.filter(o => o.service_mode === 'takeaway');
      const orderForTable = (id) => active.find(o => o.table === id) || null;

      const selectTable = (table) => {
        setSelKind('table'); setSelTable(table);
        setOrder(orderForTable(table.id));   // resume existing, or null -> lazy create on first item
      };
      const newTakeaway = () => { setSelKind('takeaway'); setSelTable(null); setOrder(null); };
      const resumeTakeaway = (o) => { setSelKind('takeaway'); setSelTable(null); setOrder(o); };

      const ensureOrder = async () => {
        if (order) return order;
        const body = selKind === 'takeaway'
          ? { service_mode: 'takeaway' }
          : { service_mode: 'dine_in', table_id: selTable && selTable.id };
        const o = await api('/orders/', { method: 'POST', body });
        setOrder(o); return o;
      };

      const addItem = async (item, is_half) => {
        if (!selKind) { alert('Pick a table or start a takeaway first'); return; }
        try {
          const base = await ensureOrder();
          const o = await api('/orders/' + base.id + '/add_line/', { method: 'POST', body: { item_id: item.id, qty: 1, is_half } });
          setOrder(o); refreshActive();
        } catch (e) { alert(e.message); }
      };
      const changeQty = async (line, delta) => {
        const o = await api('/orders/' + order.id + '/update_line/', { method: 'POST', body: { line_id: line.id, qty: line.qty + delta } });
        setOrder(o); refreshActive();
      };
      const clearSel = () => { setSelKind(null); setSelTable(null); setOrder(null); };
      const freeTable = async () => {
        if (!selTable) return;
        const msg = order && Number(order.total) > 0
          ? ('Table ' + selTable.name + ' has an unpaid order of ' + rupee(order.total) + '. Free it and cancel that order?')
          : ('Free table ' + selTable.name + '?');
        if (!confirm(msg)) return;
        try { await api('/tables/' + selTable.id + '/free/', { method: 'POST' }); clearSel(); await loadBase(); }
        catch (e) { alert(e.message); }
      };
      const setCustomer = async (phone, name) => {
        if (!order) return;
        try {
          const o = await api('/orders/' + order.id + '/set_customer/', { method: 'POST', body: { phone, name } });
          setOrder(o); refreshActive();
        } catch (e) { alert(e.message); }
      };
      const sendBill = (channel, o) => {
        const text = buildBillText(o, tenantInfo);
        if (channel === 'whatsapp') {
          const phone = o.customer_phone || '';
          if (!phone && !confirm('No customer phone on this order. Open WhatsApp to choose a contact?')) return;
          window.open(waLink(phone, text), '_blank');
        } else if (channel === 'telegram') {
          window.open(tgShareLink(text), '_blank');
        } else if (channel === 'email') {
          window.open(mailtoLink('Your bill from ' + ((tenantInfo && tenantInfo.name) || 'us'), text), '_blank');
        }
      };
      const onPaid = async (o) => {
        if (o.status === 'paid') {
          setPay(false);
          setPayResult({ total: o.total, token: o.token, takeaway: o.service_mode === 'takeaway', table: o.table_name, order: o, tenant: tenantInfo });
          clearSel(); await loadBase();
        } else { setOrder(o); }
      };

      const billTitle = selKind === 'table' ? (selTable ? selTable.name : 'Table')
        : selKind === 'takeaway' ? (order ? ('Takeaway #' + order.id + (order.token ? ' · Token ' + order.token : '')) : 'New takeaway')
        : 'No order';
      const billSub = order ? ('Order #' + order.id + ' · ' + order.status)
        : selKind ? 'Add items to start' : 'Select a table or takeaway';

      const ql = q.trim().toLowerCase();
      const visibleMenu = menu
        .map(cat => ({ ...cat, items: ql ? cat.items.filter(it => it.name.toLowerCase().includes(ql)) : cat.items }))
        .filter(cat => ql ? cat.items.length > 0 : (activeCat === 'all' || cat.id === activeCat));

      return html`
        <div class="cashier">
          <div class="pane tables">
            <h3>Dine-in</h3>
            ${tables.map(t => {
              const occ = orderForTable(t.id);
              const isSel = selKind === 'table' && selTable && selTable.id === t.id;
              return html`
                <button key=${t.id} class=${'table-btn ' + (occ ? 'occupied ' : '') + (isSel ? 'sel' : '')}
                        onClick=${() => selectTable(t)}>
                  ${t.name}<div class="seats">${t.seats} seats · ${occ ? 'occupied' : 'free'}</div></button>`;
            })}
            <h3 style=${{ marginTop: '16px' }}>Takeaway / Counter</h3>
            <button class=${'table-btn ' + (selKind === 'takeaway' && !order ? 'sel' : '')} onClick=${newTakeaway}>
              + New takeaway</button>
            ${takeaways.map(o => html`
              <button key=${o.id} class=${'table-btn occupied ' + (order && order.id === o.id ? 'sel' : '')}
                      onClick=${() => resumeTakeaway(o)}>
                ${o.token ? ('Token ' + o.token) : ('Takeaway #' + o.id)}
                <div class="seats">${rupee(o.total)} · ${o.lines.length} item${o.lines.length === 1 ? '' : 's'}</div></button>`)}
          </div>

          <div class="pane menu">
            <div class="menu-tools">
              <input class="menu-search" placeholder="Search menu…" value=${q} onChange=${e => setQ(e.target.value)} />
              <div class="cat-tabs">
                <button class=${'chip ' + (activeCat === 'all' && !ql ? 'on' : '')} onClick=${() => { setActiveCat('all'); setQ(''); }}>All</button>
                ${menu.map(c => html`<button key=${c.id} class=${'chip ' + (activeCat === c.id && !ql ? 'on' : '')} onClick=${() => { setActiveCat(c.id); setQ(''); }}>${c.name}</button>`)}
              </div>
            </div>
            ${menu.length === 0 && html`<div class="empty">No menu items yet. Add them from Menu / admin.</div>`}
            ${menu.length > 0 && visibleMenu.length === 0 && html`<div class="empty">No items match “${q}”.</div>`}
            ${visibleMenu.map(cat => html`
              <div class="cat" key=${cat.id}>
                <h4>${cat.name}</h4>
                <div class="items">
                  ${cat.items.map(it => html`
                    <div class="item" key=${it.id}>
                      <div class="nm"><span class=${'dot ' + (FOOD[it.food_type] || '')}></span>${it.name}</div>
                      <div class="price">${rupee(it.price)}${it.half_price ? ' · half ' + rupee(it.half_price) : ''}</div>
                      <div class="add-row">
                        <button class="btn sm" style=${{ flex: 1 }} onClick=${() => addItem(it, false)}>Add</button>
                        ${Number(it.half_price) > 0 && html`
                          <button class="btn sm ghost" onClick=${() => addItem(it, true)}>½</button>`}
                      </div>
                    </div>`)}
                </div>
              </div>`)}
          </div>

          <div class="pane bill">
            <div class="bill-head" style=${{ display: 'flex', alignItems: 'flex-start', gap: '8px' }}>
              <div style=${{ flex: 1 }}>
                <div class="t">${billTitle}</div>
                <div class="s">${billSub}</div>
              </div>
              ${selKind === 'table' && order && html`
                <button class="btn ghost sm" onClick=${freeTable}>Free table</button>`}
            </div>
            ${order && html`<${CustomerBar} key=${order.id} order=${order} onSet=${setCustomer} />`}
            <div class="lines">
              ${!selKind && html`<div class="empty">Pick a table or start a takeaway to begin.</div>`}
              ${selKind && !order && html`<div class="empty">Tap menu items to add them.</div>`}
              ${order && order.lines.length === 0 && html`<div class="empty">Tap menu items to add them.</div>`}
              ${order && order.lines.map(l => html`
                <div class="line" key=${l.id}>
                  <div class="ln">
                    <div class="nm">${l.name_snapshot}${l.is_half ? ' (½)' : ''}</div>
                    <div class="meta">${rupee(l.unit_price)} · GST ${l.gst_rate}%</div>
                  </div>
                  <div class="qty">
                    <button onClick=${() => changeQty(l, -1)}>−</button>
                    <span>${l.qty}</span>
                    <button onClick=${() => changeQty(l, +1)}>+</button>
                  </div>
                  <div class="lt">${rupee(l.line_total)}</div>
                </div>`)}
            </div>
            ${order && html`
              <div class="bill-foot">
                ${Number(order.tax_total) > 0 && html`
                  <div class="row"><span class="muted">Subtotal</span><span>${rupee(order.subtotal)}</span></div>
                  <div class="row"><span class="muted">GST</span><span>${rupee(order.tax_total)}</span></div>`}
                <div class="row total"><span>Total</span><span>${rupee(order.total)}</span></div>
                ${Number(order.amount_paid) > 0 && html`
                  <div class="row"><span class="muted">Paid</span><span>${rupee(order.amount_paid)}</span></div>
                  <div class="row"><span class="muted">Balance</span><span>${rupee(order.balance)}</span></div>`}
                <button class="btn accent" style=${{ width: '100%', marginTop: '10px' }}
                        disabled=${order.lines.length === 0} onClick=${() => setPay(true)}>
                  Take payment · ${rupee(order.balance)}</button>
                <div style=${{ marginTop: '10px' }}>
                  <div style=${{ fontSize: '12px', color: 'var(--ink-soft)', marginBottom: '5px' }}>Send bill</div>
                  <div style=${{ display: 'flex', gap: '6px' }}>
                    <button class="btn ghost sm" style=${{ flex: 1 }} disabled=${order.lines.length === 0} onClick=${() => sendBill('whatsapp', order)}>WhatsApp</button>
                    <button class="btn ghost sm" style=${{ flex: 1 }} disabled=${order.lines.length === 0} onClick=${() => sendBill('telegram', order)}>Telegram</button>
                    <button class="btn ghost sm" style=${{ flex: 1 }} disabled=${order.lines.length === 0} onClick=${() => sendBill('email', order)}>Email</button>
                  </div>
                </div>
                <button class="btn ghost sm" style=${{ width: '100%', marginTop: '8px' }}
                        disabled=${order.lines.length === 0} onClick=${() => printBill(order, tenantInfo)}>
                  🖨 Print bill (customer + restaurant copy)</button>
              </div>`}
          </div>

          ${pay && html`<${PayModal} order=${order} tenant=${tenantInfo} onClose=${() => setPay(false)} onPaid=${onPaid} />`}
          ${payResult && html`<${PostPayModal} result=${payResult} onClose=${() => setPayResult(null)} />`}
        </div>`;
    }

    function PayModal({ order, tenant, onClose, onPaid }) {
      const isTakeaway = order.service_mode === 'takeaway';
      const [method, setMethod] = useState('cash');
      const [amount, setAmount] = useState(Number(order.balance).toFixed(2));
      const [makeToken, setMakeToken] = useState(isTakeaway);
      const [busy, setBusy] = useState(false); const [err, setErr] = useState('');
      const submit = async () => {
        setErr(''); setBusy(true);
        try {
          const o = await api('/orders/' + order.id + '/pay/', { method: 'POST', body: { method, amount, make_token: makeToken } });
          onPaid(o);
        } catch (e) { setErr(e.message); setBusy(false); }
      };
      return html`
        <div class="modal-bg" onClick=${onClose}>
          <div class="modal" onClick=${e => e.stopPropagation()}>
            <h3>Payment · ${rupee(order.balance)} due</h3>
            ${err && html`<div class="err">${err}</div>`}
            <div class="pay-methods">
              ${['cash', 'upi', 'card'].map(m => html`
                <button key=${m} class=${method === m ? 'sel' : ''} onClick=${() => setMethod(m)}>${m}</button>`)}
            </div>
            <div class="field"><label>Amount (partial allowed for split)</label>
              <input value=${amount} onChange=${e => setAmount(e.target.value)} /></div>
            ${method === 'upi' && (tenant && tenant.upi_vpa
              ? (() => {
                  const qr = upiQrDataUrl(tenant.upi_vpa, tenant.upi_payee_name, amount, 'Order ' + order.id);
                  return qr ? html`
                    <div style=${{ textAlign: 'center', padding: '4px 0 10px' }}>
                      <img src=${qr.url} alt="UPI QR" style=${{ width: '176px', height: '176px' }} />
                      <div style=${{ fontSize: '13px', color: 'var(--ink)', marginTop: '4px' }}>Scan to pay ${rupee(amount)}</div>
                      <div style=${{ fontSize: '12px', color: 'var(--ink-soft)' }}>${tenant.upi_payee_name ? tenant.upi_payee_name + ' · ' : ''}${tenant.upi_vpa}</div>
                      <div style=${{ fontSize: '12px', color: 'var(--warn)', marginTop: '3px' }}>Confirm below once the money is received.</div>
                    </div>` : '';
                })()
              : html`<div style=${{ fontSize: '13px', color: 'var(--ink-soft)', padding: '4px 0 10px' }}>
                  Add your UPI ID in Settings → Payments to show a scan-to-pay QR here.</div>`)}
            ${isTakeaway && !order.token && html`
              <label style=${{ display: 'flex', alignItems: 'center', gap: '8px', margin: '2px 0 12px', fontSize: '14px' }}>
                <input type="checkbox" checked=${makeToken} onChange=${e => setMakeToken(e.target.checked)} />
                Generate a pickup token</label>`}
            <div style=${{ display: 'flex', gap: '8px', marginTop: '8px' }}>
              <button class="btn ghost" style=${{ flex: 1 }} onClick=${onClose}>Cancel</button>
              <button class="btn accent" style=${{ flex: 2 }} disabled=${busy} onClick=${submit}>
                ${busy ? 'Saving…' : 'Confirm payment'}</button>
            </div>
          </div>
        </div>`;
    }

    function PostPayModal({ result, onClose }) {
      return html`
        <div class="modal-bg" onClick=${onClose}>
          <div class="modal" onClick=${e => e.stopPropagation()} style=${{ textAlign: 'center', maxWidth: '320px' }}>
            <div style=${{ fontSize: '40px', lineHeight: 1, marginBottom: '6px' }}>✅</div>
            <h3 style=${{ margin: '0 0 4px' }}>Paid ${rupee(result.total)}</h3>
            ${result.token != null && html`
              <div style=${{ margin: '14px 0 4px', color: 'var(--ink-soft)', fontSize: '13px', textTransform: 'uppercase', letterSpacing: '.05em' }}>Pickup token</div>
              <div style=${{ fontSize: '54px', fontWeight: 800, color: 'var(--brand)', lineHeight: 1 }}>${result.token}</div>`}
            ${result.token == null && html`
              <p style=${{ color: 'var(--ink-soft)', fontSize: '14px', margin: '6px 0 0' }}>
                ${result.takeaway ? 'Takeaway order closed.' : (result.table ? (result.table + ' is now free.') : 'Order closed.')}</p>`}
            ${result.order && html`
              <div style=${{ marginTop: '16px', textAlign: 'left' }}>
                <div style=${{ fontSize: '12px', color: 'var(--ink-soft)', marginBottom: '6px' }}>Send bill</div>
                <div style=${{ display: 'flex', gap: '6px' }}>
                  <button class="btn ghost sm" style=${{ flex: 1 }} onClick=${() => window.open(waLink(result.order.customer_phone || '', buildBillText(result.order, result.tenant)), '_blank')}>WhatsApp</button>
                  <button class="btn ghost sm" style=${{ flex: 1 }} onClick=${() => window.open(tgShareLink(buildBillText(result.order, result.tenant)), '_blank')}>Telegram</button>
                  <button class="btn ghost sm" style=${{ flex: 1 }} onClick=${() => window.open(mailtoLink('Your bill', buildBillText(result.order, result.tenant)), '_blank')}>Email</button>
                </div>
                <button class="btn ghost sm" style=${{ width: '100%', marginTop: '8px' }}
                        onClick=${() => printBill(result.order, result.tenant)}>
                  🖨 Print bill (customer + restaurant copy)</button>
              </div>`}
            <button class="btn accent" style=${{ width: '100%', marginTop: '18px' }} onClick=${onClose}>Done</button>
          </div>
        </div>`;
    }

    // Optional, skippable customer capture on the open bill (phone-first CRM).
    function CustomerBar({ order, onSet }) {
      const has = !!order.customer;
      const [open, setOpen] = useState(false);
      const [phone, setPhone] = useState('');
      const [name, setName] = useState('');
      const bar = { display: 'flex', alignItems: 'center', gap: '8px', padding: '8px 16px', borderBottom: '1px solid var(--line)', background: '#faf7f1' };
      const inp = { padding: '7px 9px', border: '1px solid var(--line)', borderRadius: '8px' };
      const openEdit = () => { setPhone(order.customer_phone || ''); setName(order.customer_name || ''); setOpen(true); };
      const save = () => { if (!phone.trim()) return; onSet(phone.trim(), name.trim()); setOpen(false); };
      if (open) {
        return html`
          <div style=${{ ...bar, flexWrap: 'wrap', gap: '6px' }}>
            <input placeholder="Phone" inputmode="tel" value=${phone} onChange=${e => setPhone(e.target.value)}
              style=${{ ...inp, flex: 1, minWidth: '110px' }} />
            <input placeholder="Name (optional)" value=${name} onChange=${e => setName(e.target.value)}
              style=${{ ...inp, flex: 1, minWidth: '110px' }} />
            <button class="btn sm" disabled=${!phone.trim()} onClick=${save}>Save</button>
            <button class="btn ghost sm" onClick=${() => setOpen(false)}>Cancel</button>
          </div>`;
      }
      if (has) {
        return html`
          <div style=${bar}>
            <span style=${{ flex: 1, fontSize: '13px' }}>📱 ${order.customer_phone}${order.customer_name ? ' · ' + order.customer_name : ''}</span>
            <button class="btn ghost sm" onClick=${openEdit}>Change</button>
            <button class="btn ghost sm" onClick=${() => onSet('', '')}>Remove</button>
          </div>`;
      }
      return html`
        <div style=${bar}>
          <span style=${{ flex: 1, fontSize: '13px', color: 'var(--ink-soft)' }}>Add customer phone (for bill / loyalty)</span>
          <button class="btn ghost sm" onClick=${openEdit}>+ Add</button>
        </div>`;
    }

    // ---------------- Kitchen ----------------
    function Kitchen() {
      const [orders, setOrders] = useState([]);
      const load = useCallback(async () => { try { setOrders(await api('/orders/kitchen/') || []); } catch {} }, []);
      useEffect(() => { load(); const t = setInterval(load, 5000); return () => clearInterval(t); }, [load]);
      const setStatus = async (o, status) => { await api('/orders/' + o.id + '/set_status/', { method: 'POST', body: { status } }); load(); };
      const mins = (iso) => Math.max(0, Math.round((Date.now() - new Date(iso)) / 60000));
      return html`
        <div class="kds">
          ${orders.length === 0 && html`<div class="center-msg">No active kitchen orders.</div>`}
          <div class="kds-grid">
            ${orders.map(o => html`
              <div class=${'ticket ' + o.status} key=${o.id}>
                <div class="th">
                  <b>${o.table_name || ('Takeaway' + (o.token ? ' · Token ' + o.token : ''))}</b>
                  <span class=${'badge ' + o.status}>${o.status}</span>
                </div>
                <div class="tl">
                  ${o.lines.map(l => html`
                    <div class="li" key=${l.id}><span><span class="q">${l.qty}×</span> ${l.name_snapshot}${l.is_half ? ' (½)' : ''}</span></div>`)}
                  <div class="th" style=${{ border: 'none', padding: '6px 0 0' }}><span class="age">#${o.id} · ${mins(o.created_at)} min ago</span></div>
                </div>
                <div class="ta">
                  ${o.status === 'new' && html`<button class="btn sm" style=${{ flex: 1 }} onClick=${() => setStatus(o, 'preparing')}>Start</button>`}
                  ${o.status === 'preparing' && html`<button class="btn sm accent" style=${{ flex: 1 }} onClick=${() => setStatus(o, 'ready')}>Ready</button>`}
                  ${o.status === 'ready' && html`<button class="btn sm ghost" style=${{ flex: 1 }} onClick=${() => setStatus(o, 'delivered')}>Served</button>`}
                </div>
              </div>`)}
          </div>
        </div>`;
    }

    // ---------------- Owner home ----------------
    function Home({ auth }) {
      const [stats, setStats] = useState(null);
      useEffect(() => { (async () => {
        try {
          const [active, tables] = await Promise.all([api('/orders/?status=active'), api('/tables/')]);
          const occ = (tables || []).filter(t => t.status === 'occupied').length;
          setStats({ open: (active || []).length, occ, tables: (tables || []).length });
        } catch {}
      })(); }, []);
      return html`
        <div style=${{ padding: '24px', maxWidth: '720px' }}>
          <h2 style=${{ marginTop: 0 }}>Welcome${auth.tenant ? ', ' + auth.tenant.name : ''}</h2>
          <p style=${{ color: 'var(--ink-soft)' }}>Signed in as <b style=${{ textTransform: 'capitalize' }}>${auth.role}</b> (${auth.username}).</p>
          ${stats && html`
            <div style=${{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: '12px', marginTop: '16px' }}>
              ${[['Open orders', stats.open], ['Occupied tables', stats.occ + ' / ' + stats.tables], ['Tables', stats.tables]].map(([k, v]) => html`
                <div key=${k} style=${{ background: 'var(--surface)', borderRadius: 'var(--radius)', padding: '18px', boxShadow: 'var(--shadow)' }}>
                  <div style=${{ fontSize: '28px', fontWeight: 800, color: 'var(--brand)' }}>${v}</div>
                  <div style=${{ color: 'var(--ink-soft)', fontSize: '13px' }}>${k}</div>
                </div>`)}
            </div>`}
        </div>`;
    }

    // ---------------- Menu manager (owner/admin) ----------------
    const FOOD_OPTS = [['veg', 'Veg'], ['nonveg', 'Non-veg'], ['egg', 'Egg']];
    const selStyle = { width: '100%', padding: '10px', border: '1px solid var(--line)', borderRadius: '10px', background: 'var(--surface)' };

    function MenuManager() {
      const [cats, setCats] = useState([]);
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(true);
      const [editItem, setEditItem] = useState(null);   // existing item, or { category } for new
      const [importCat, setImportCat] = useState(null); // category id for the import modal
      const [newCat, setNewCat] = useState('');
      const [gstDefault, setGstDefault] = useState(5);

      const load = useCallback(async () => {
        setLoading(true);
        try {
          const [c, i, ti] = await Promise.all([api('/menu-categories/'), api('/menu-items/'), api('/tenant/').catch(() => null)]);
          setCats((c || []).slice().sort((a, b) => a.sort_order - b.sort_order));
          setItems(i || []);
          if (ti && ti.default_gst_rate != null) setGstDefault(ti.default_gst_rate);
        } catch (e) { alert(e.message); } finally { setLoading(false); }
      }, []);
      useEffect(() => { load(); }, [load]);

      const addCategory = async () => {
        const name = newCat.trim(); if (!name) return;
        try { await api('/menu-categories/', { method: 'POST', body: { name, sort_order: cats.length } }); setNewCat(''); load(); }
        catch (e) { alert(e.message); }
      };
      const renameCategory = async (cat) => {
        const name = prompt('Category name', cat.name); if (name == null) return;
        try { await api('/menu-categories/' + cat.id + '/', { method: 'PATCH', body: { name: name.trim() } }); load(); }
        catch (e) { alert(e.message); }
      };
      const deleteCategory = async (cat) => {
        if (!confirm('Delete category "' + cat.name + '"?')) return;
        try { await api('/menu-categories/' + cat.id + '/', { method: 'DELETE' }); load(); }
        catch (e) { alert(e.message); }
      };
      const deleteItem = async (it) => {
        if (!confirm('Delete "' + it.name + '"?')) return;
        try { await api('/menu-items/' + it.id + '/', { method: 'DELETE' }); load(); }
        catch (e) { alert(e.message); }
      };
      const toggleAvail = async (it) => {
        try { await api('/menu-items/' + it.id + '/', { method: 'PATCH', body: { is_available: !it.is_available } }); load(); }
        catch (e) { alert(e.message); }
      };
      const moveItem = async (it, catId) => {
        if (catId === it.category) return;
        try { await api('/menu-items/' + it.id + '/', { method: 'PATCH', body: { category: catId } }); load(); }
        catch (e) { alert(e.message); }
      };

      if (loading) return html`<div class="center-msg">Loading menu…</div>`;

      return html`
        <div style=${{ padding: '18px', maxWidth: '920px', margin: '0 auto', height: '100%', overflowY: 'auto' }}>
          <div style=${{ display: 'flex', gap: '8px', alignItems: 'center', marginBottom: '18px' }}>
            <h2 style=${{ margin: 0, flex: 1 }}>Menu</h2>
            <button class="btn sm ghost" onClick=${() => apiDownload('/menu-export/?fmt=csv', 'menu.csv')}>Export CSV</button>
            <button class="btn sm ghost" onClick=${() => setImportCat('all')}>Import menu</button>
            <input placeholder="New category" value=${newCat} onChange=${e => setNewCat(e.target.value)}
                   onKeyDown=${e => e.key === 'Enter' && addCategory()}
                   style=${{ padding: '9px 11px', border: '1px solid var(--line)', borderRadius: '8px' }} />
            <button class="btn sm" onClick=${addCategory}>Add category</button>
          </div>

          ${cats.length === 0 && html`<div class="empty">No categories yet. Add one above to start building the menu.</div>`}

          ${cats.map(cat => {

                  <button class="btn ghost sm" onClick=${() => deleteCategory(cat)}>Delete</button>

                ${its.map(it => html`
                  <div key=${it.id} style=${{ display: 'flex', alignItems: 'center', gap: '10px', padding: '10px 14px', borderBottom: '1px solid var(--line)', opacity: it.is_available ? 1 : 0.5 }}>
                    <span class=${'dot ' + (FOOD[it.food_type] || '')}></span>
                    <div style=${{ flex: 1 }}>
                      <div style=${{ fontWeight: 600 }}>${it.name}</div>
                      <div style=${{ fontSize: '12px', color: 'var(--ink-soft)' }}>
                        ${rupee(it.price)}${Number(it.half_price) > 0 ? ' · half ' + rupee(it.half_price) : ''} · GST ${it.gst_rate}%</div>
                    </div>
                    <select title="Move to category" value=${it.category} onChange=${e => moveItem(it, Number(e.target.value))}
                      style=${{ padding: '6px 8px', border: '1px solid var(--line)', borderRadius: '8px', background: 'var(--surface)', fontSize: '13px', maxWidth: '150px' }}>
                      ${cats.map(c => html`<option key=${c.id} value=${c.id}>${c.name}</option>`)}
                    </select>
                    <button class="btn ghost sm" onClick=${() => toggleAvail(it)}>${it.is_available ? 'Available' : 'Hidden'}</button>
                    <button class="btn ghost sm" onClick=${() => setEditItem(it)}>Edit</button>
                    <button class="btn ghost sm" onClick=${() => deleteItem(it)}>Delete</button>
                  </div>`)}

          ${editItem && html`<${ItemModal} item=${editItem} cats=${cats} defaultGst=${gstDefault}

          ${importCat != null && html`<${ImportModal} cats=${cats}
              defaultCategoryName=${typeof importCat === 'number' ? (cats.find(c => c.id === importCat) || {}).name : null}
              onClose=${() => setImportCat(null)} onDone=${() => { setImportCat(null); load(); }} />`}

    function ItemModal({ item, cats, defaultGst, onClose, onSaved }) {
      const isNew = !item.id;
      const [f, setF] = useState({
        name: item.name || '', price: item.price || '', half_price: item.half_price || '',
        food_type: item.food_type || 'veg', gst_rate: item.gst_rate != null ? item.gst_rate : (defaultGst != null ? defaultGst : 5),
        is_available: item.is_available != null ? item.is_available : true,
        category: item.category || (cats[0] && cats[0].id),
      });
      const [busy, setBusy] = useState(false); const [err, setErr] = useState('');
      const set = (k, v) => setF(s => ({ ...s, [k]: v }));
      const save = async () => {
        setErr(''); setBusy(true);
        const body = { ...f, half_price: f.half_price === '' ? null : f.half_price };
        try {
          if (isNew) await api('/menu-items/', { method: 'POST', body });
          else await api('/menu-items/' + item.id + '/', { method: 'PATCH', body });
          onSaved();
        } catch (e) { setErr(e.message); setBusy(false); }
      };
      return html`
        <div class="modal-bg" onClick=${onClose}>
          <div class="modal" onClick=${e => e.stopPropagation()}>
            <h3>${isNew ? 'New item' : 'Edit item'}</h3>
            ${err && html`<div class="err">${err}</div>`}
            <div class="field"><label>Name</label>
              <input value=${f.name} onChange=${e => set('name', e.target.value)} autoFocus /></div>
            <div style=${{ display: 'flex', gap: '10px' }}>
              <div class="field" style=${{ flex: 1 }}><label>Price ₹</label>
                <input value=${f.price} onChange=${e => set('price', e.target.value)} /></div>
              <div class="field" style=${{ flex: 1 }}><label>Half ₹ (optional)</label>
                <input value=${f.half_price} onChange=${e => set('half_price', e.target.value)} /></div>
            </div>
            <div style=${{ display: 'flex', gap: '10px' }}>
              <div class="field" style=${{ flex: 1 }}><label>Type</label>
                <select value=${f.food_type} onChange=${e => set('food_type', e.target.value)} style=${selStyle}>
                  ${FOOD_OPTS.map(([v, l]) => html`<option key=${v} value=${v}>${l}</option>`)}
                </select></div>
              <div class="field" style=${{ flex: 1 }}><label>GST %</label>
                <input value=${f.gst_rate} onChange=${e => set('gst_rate', e.target.value)} /></div>
            </div>
            <div class="field"><label>Category</label>
              <select value=${f.category} onChange=${e => set('category', Number(e.target.value))} style=${selStyle}>
                ${cats.map(c => html`<option key=${c.id} value=${c.id}>${c.name}</option>`)}
              </select></div>
            <label style=${{ display: 'flex', alignItems: 'center', gap: '8px', margin: '2px 0 14px', fontSize: '14px' }}>
              <input type="checkbox" checked=${f.is_available} onChange=${e => set('is_available', e.target.checked)} />
              Available (shown on the cashier screen)</label>
            <div style=${{ display: 'flex', gap: '8px' }}>
              <button class="btn ghost" style=${{ flex: 1 }} onClick=${onClose}>Cancel</button>
              <button class="btn accent" style=${{ flex: 2 }} disabled=${busy || !f.name || f.price === '' || !f.category} onClick=${save}>
                ${busy ? 'Saving…' : 'Save'}</button>
            </div>
          </div>
        </div>`;
    }

    function ImportModal({ cats, defaultCategoryName, onClose, onDone }) {
      const [text, setText] = useState('');
      const [rows, setRows] = useState(null);
      const [busy, setBusy] = useState(false); const [err, setErr] = useState('');
      const [uploading, setUploading] = useState(false);
      const fileRef = useRef(null); const camRef = useRef(null);
      const defCat = defaultCategoryName || '';
      const withCat = (r) => ({ ...r, category: (r.category && r.category.trim()) || defCat });

      const parseText = () => {
        const out = text.split('\n').map(l => l.trim()).filter(Boolean).map(line => {
          const m = line.match(/^(.*?)[\s,\-–]+(\d+(?:\.\d+)?)\s*$/);
          const base = m ? { name: m[1].trim(), price: m[2] } : { name: line, price: '' };
          return { ...base, half_price: null, food_type: 'veg', gst_rate: 5, category: defCat };
        });
        setRows(out);
      };

      const onFile = async (e) => {
        const file = e.target.files && e.target.files[0];
        e.target.value = '';
        if (!file) return;
        setErr(''); setUploading(true);
        try {
          const fd = new FormData(); fd.append('file', file);
          const data = await apiUpload('/menu-import/', fd);
          if (!data || !data.rows || data.rows.length === 0) {
            setErr('Could not read any items from that file. Try a clearer photo, or use the paste box below.');
          } else {
            setRows(data.rows.map(withCat));
          }
        } catch (e2) { setErr(e2.message); } finally { setUploading(false); }
      };

      const setRow = (i, k, v) => setRows(rs => rs.map((r, j) => j === i ? { ...r, [k]: v } : r));
      const removeRow = (i) => setRows(rs => rs.filter((_, j) => j !== i));
      const ready = rows ? rows.filter(r => r.name && r.price !== '') : [];
      const catCount = new Set(ready.map(r => (r.category || defCat || 'Other').trim().toLowerCase())).size;

      const confirm = async () => {
        setErr(''); setBusy(true);
        try {
          const map = {}; let order = cats.length;
          cats.forEach(c => { map[c.name.trim().toLowerCase()] = c.id; });
          for (const r of ready) {
            const cname = (r.category || defCat || 'Other').trim();
            const key = cname.toLowerCase();
            if (!(key in map)) {
              const created = await api('/menu-categories/', { method: 'POST', body: { name: cname, sort_order: order++ } });
              map[key] = created.id;
            }
          }
          for (const r of ready) {
            const key = (r.category || defCat || 'Other').trim().toLowerCase();
            await api('/menu-items/', { method: 'POST', body: {
              name: r.name, price: r.price,
              half_price: r.half_price != null && r.half_price !== '' ? r.half_price : null,
              food_type: r.food_type, gst_rate: r.gst_rate, is_available: true, category: map[key],
            } });
          }
          onDone();
        } catch (e) { setErr(e.message + ' — some items may have been added.'); setBusy(false); }
      };
      return html`
        <div class="modal-bg" onClick=${onClose}>
          <div class="modal" onClick=${e => e.stopPropagation()} style=${{ maxWidth: rows ? '680px' : '520px' }}>
            <h3>${defaultCategoryName ? 'Import into ' + defaultCategoryName : 'Import menu'}</h3>
            ${err && html`<div class="err">${err}</div>`}
            <datalist id="catnames">${cats.map(c => html`<option key=${c.id} value=${c.name} />`)}</datalist>
            ${!rows && html`
              <p style=${{ color: 'var(--ink-soft)', fontSize: '13px', marginTop: 0 }}>
                Upload a <b>photo, PDF, or spreadsheet</b> of the menu and AI reads it — or paste items below.
                ${defaultCategoryName ? '' : ' AI also suggests a category for each item — you can rename them before saving.'}
                You'll review and edit everything before saving.</p>
              <div style=${{ display: 'flex', gap: '8px', marginBottom: '10px' }}>
                <button class="btn" style=${{ flex: 1 }} disabled=${uploading} onClick=${() => fileRef.current && fileRef.current.click()}>
                  ${uploading ? 'Reading…' : 'Upload file / photo'}</button>
                <button class="btn ghost" style=${{ flex: 1 }} disabled=${uploading} onClick=${() => camRef.current && camRef.current.click()}>
                  Take photo</button>
              </div>
              <input ref=${fileRef} type="file" accept="image/*,application/pdf,.csv,.xlsx" style=${{ display: 'none' }} onChange=${onFile} />
              <input ref=${camRef} type="file" accept="image/*" capture="environment" style=${{ display: 'none' }} onChange=${onFile} />
              ${uploading && html`<div style=${{ background: '#fff7e8', border: '1px solid var(--warn)', color: 'var(--warn)', padding: '9px 12px', borderRadius: '8px', fontSize: '13px', marginBottom: '10px' }}>
                Reading your menu with AI… this usually takes a few seconds.</div>`}
              <p style=${{ color: 'var(--ink-soft)', fontSize: '13px', margin: '6px 0 4px' }}>Or paste one item per line, e.g. <b>Masala Dosa 80</b>:</p>
              <textarea value=${text} onChange=${e => setText(e.target.value)} rows=${5}
                style=${{ width: '100%', padding: '10px', border: '1px solid var(--line)', borderRadius: '10px', fontFamily: 'inherit', fontSize: '14px' }}></textarea>
              <div style=${{ display: 'flex', gap: '8px', marginTop: '12px' }}>
                <button class="btn ghost" style=${{ flex: 1 }} onClick=${onClose}>Cancel</button>
                <button class="btn" style=${{ flex: 2 }} disabled=${!text.trim() || uploading} onClick=${parseText}>Review pasted</button>
              </div>`}
            ${rows && html`
              <p style=${{ color: 'var(--ink-soft)', fontSize: '13px', marginTop: 0 }}>
                Review and fix, then save. Set a category for each (type a new name or pick an existing one). Rows without a price are skipped.</p>
              <div style=${{ display: 'flex', gap: '6px', fontSize: '11px', color: 'var(--ink-soft)', textTransform: 'uppercase', letterSpacing: '.03em', padding: '0 2px 4px' }}>
                <span style=${{ flex: 2 }}>Item</span><span style=${{ width: '64px' }}>Price</span><span style=${{ width: '86px' }}>Type</span><span style=${{ flex: 1 }}>Category</span><span style=${{ width: '24px' }}></span>
              </div>
              <div style=${{ maxHeight: '340px', overflowY: 'auto', margin: '0 0 12px' }}>
                ${rows.map((r, i) => html`
                  <div key=${i} style=${{ display: 'flex', gap: '6px', marginBottom: '6px' }}>
                    <input value=${r.name} onChange=${e => setRow(i, 'name', e.target.value)}
                      style=${{ flex: 2, padding: '7px', border: '1px solid var(--line)', borderRadius: '8px' }} />
                    <input value=${r.price} placeholder="₹" onChange=${e => setRow(i, 'price', e.target.value)}
                      style=${{ width: '64px', padding: '7px', border: '1px solid var(--line)', borderRadius: '8px' }} />
                    <select value=${r.food_type} onChange=${e => setRow(i, 'food_type', e.target.value)}
                      style=${{ width: '86px', padding: '7px', border: '1px solid var(--line)', borderRadius: '8px', background: 'var(--surface)' }}>
                      ${FOOD_OPTS.map(([v, l]) => html`<option key=${v} value=${v}>${l}</option>`)}
                    </select>
                    <input list="catnames" value=${r.category || ''} placeholder="Category"
                      onChange=${e => setRow(i, 'category', e.target.value)}
                      style=${{ flex: 1, padding: '7px', border: '1px solid var(--line)', borderRadius: '8px' }} />
                    <button class="btn ghost sm" onClick=${() => removeRow(i)}>✕</button>
                  </div>`)}
              </div>
              <div style=${{ display: 'flex', gap: '8px' }}>
                <button class="btn ghost" style=${{ flex: 1 }} onClick=${() => setRows(null)}>Back</button>
                <button class="btn accent" style=${{ flex: 2 }} disabled=${busy || ready.length === 0} onClick=${confirm}>
                  ${busy ? 'Saving…' : 'Add ' + ready.length + ' items' + (catCount > 1 ? ' in ' + catCount + ' categories' : '')}</button>
              </div>`}
          </div>
        </div>`;
    }

    // ---------------- Settings (owner/admin) ----------------
    function TableRow({ t, onSave, onDelete, onFree }) {
      const [name, setName] = useState(t.name);
      const [seats, setSeats] = useState(String(t.seats));
      const dirty = name.trim() !== t.name || String(seats) !== String(t.seats);
      return html`
        <div style=${{ display: 'flex', alignItems: 'center', gap: '8px', padding: '10px 14px', borderBottom: '1px solid var(--line)' }}>
          <input value=${name} onChange=${e => setName(e.target.value)}
            style=${{ flex: 1, padding: '8px', border: '1px solid var(--line)', borderRadius: '8px' }} />
          <input type="number" min="1" value=${seats} onChange=${e => setSeats(e.target.value)}
            style=${{ width: '72px', padding: '8px', border: '1px solid var(--line)', borderRadius: '8px' }} />
          <span style=${{ fontSize: '12px', color: t.status === 'occupied' ? 'var(--warn)' : 'var(--ink-soft)', minWidth: '60px' }}>${t.status}</span>
          ${t.status === 'occupied' && html`<button class="btn ghost sm" onClick=${() => onFree(t)}>Free</button>`}
          <button class="btn sm" disabled=${!dirty || !name.trim()}
            onClick=${() => onSave(t, { name: name.trim(), seats: Number(seats) || 1 })}>Save</button>
          <button class="btn ghost sm" onClick=${() => onDelete(t)}>Delete</button>
        </div>`;
    }

    const ROLE_OPTS = [['cashier', 'Cashier'], ['waiter', 'Waiter'], ['kitchen', 'Kitchen'], ['admin', 'Admin']];
    const WAGE_OPTS = [['monthly', 'Monthly'], ['daily', 'Daily'], ['hourly', 'Hourly']];

    function UserRow({ u, onSave, onDelete }) {
      const isOwner = u.role === 'owner';
      const [payOpen, setPayOpen] = useState(false);
      const [wt, setWt] = useState(u.wage_type || 'monthly');
      const [wr, setWr] = useState(u.wage_rate != null ? String(u.wage_rate) : '0');
      const [pin, setPin] = useState(u.attendance_pin || '');
      const resetPw = () => {
        const p = prompt('New password for ' + u.username + ' (min 4 characters):');
        if (p == null) return;
        if (p.trim().length < 4) { alert('Password too short.'); return; }
        onSave(u, { password: p.trim() });
      };
      const savePay = () => { onSave(u, { wage_type: wt, wage_rate: wr === '' ? 0 : wr, attendance_pin: pin.trim() }); setPayOpen(false); };
      const inp = { padding: '7px', border: '1px solid var(--line)', borderRadius: '8px' };
      return html`
        <div style=${{ borderBottom: '1px solid var(--line)', opacity: u.is_active ? 1 : 0.55 }}>
          <div style=${{ display: 'flex', alignItems: 'center', gap: '8px', padding: '10px 14px' }}>
            <div style=${{ flex: 1 }}>
              <div style=${{ fontWeight: 600 }}>${u.username}</div>
              <div style=${{ fontSize: '12px', color: 'var(--ink-soft)' }}>${u.is_active ? 'active' : 'disabled'}${!isOwner && u.attendance_pin ? ' · PIN set' : ''}</div>
            </div>
            ${isOwner && html`<span style=${{ fontSize: '13px', color: 'var(--ink-soft)' }}>owner</span>`}
            ${!isOwner && html`
              <select value=${u.role} onChange=${e => onSave(u, { role: e.target.value })}
                style=${{ ...inp, background: 'var(--surface)', fontSize: '13px' }}>
                ${ROLE_OPTS.map(([v, l]) => html`<option key=${v} value=${v}>${l}</option>`)}
              </select>
              <button class="btn ghost sm" onClick=${() => setPayOpen(o => !o)}>Pay/PIN</button>
              <button class="btn ghost sm" onClick=${() => onSave(u, { is_active: !u.is_active })}>${u.is_active ? 'Disable' : 'Enable'}</button>
              <button class="btn ghost sm" onClick=${resetPw}>Reset pw</button>
              <button class="btn ghost sm" onClick=${() => onDelete(u)}>Delete</button>`}
          </div>
          ${!isOwner && payOpen && html`
            <div style=${{ display: 'flex', gap: '8px', alignItems: 'flex-end', flexWrap: 'wrap', padding: '0 14px 12px' }}>
              <label style=${{ fontSize: '12px', color: 'var(--ink-soft)' }}>Wage type<br/>
                <select value=${wt} onChange=${e => setWt(e.target.value)} style=${{ ...inp, background: 'var(--surface)' }}>
                  ${WAGE_OPTS.map(([v, l]) => html`<option key=${v} value=${v}>${l}</option>`)}
                </select></label>
              <label style=${{ fontSize: '12px', color: 'var(--ink-soft)' }}>Rate ₹ ${wt === 'hourly' ? '/hr' : wt === 'daily' ? '/day' : '/month'}<br/>
                <input value=${wr} inputmode="decimal" onChange=${e => setWr(e.target.value)} style=${{ ...inp, width: '110px' }} /></label>
              <label style=${{ fontSize: '12px', color: 'var(--ink-soft)' }}>Clock-in PIN<br/>
                <input value=${pin} inputmode="numeric" maxlength="6" placeholder="e.g. 1234" onChange=${e => setPin(e.target.value)} style=${{ ...inp, width: '100px' }} /></label>
              <button class="btn sm" onClick=${savePay}>Save pay</button>
            </div>`}
        </div>`;
    }

    function Settings() {
      const [tables, setTables] = useState([]);
      const [users, setUsers] = useState([]);
      const [loading, setLoading] = useState(true);
      const [tName, setTName] = useState(''); const [tSeats, setTSeats] = useState('4');

      const load = useCallback(async () => {
        setLoading(true);
        try {
          const [t, u, ti] = await Promise.all([api('/tables-admin/'), api('/users-admin/'), api('/tenant/')]);
          setTables(t || []); setUsers(u || []);

        } catch (e) { alert(e.message); } finally { setLoading(false); }
      }, []);
      useEffect(() => { load(); }, [load]);

      const addTable = async () => {
        const nm = tName.trim(); if (!nm) return;
        try { await api('/tables-admin/', { method: 'POST', body: { name: nm, seats: Number(tSeats) || 1 } });
          setTName(''); setTSeats('4'); load(); }
        catch (e) { alert(e.message); }
      };
      const saveTable = async (t, patch) => {
        try { await api('/tables-admin/' + t.id + '/', { method: 'PATCH', body: patch }); load(); }
        catch (e) { alert(e.message); }
      };
      const deleteTable = async (t) => {
        if (!confirm('Delete table "' + t.name + '"?')) return;
        try { await api('/tables-admin/' + t.id + '/', { method: 'DELETE' }); load(); }
        catch (e) { alert(e.message); }
      };
      const freeTableRow = async (t) => {
        if (!confirm('Free table "' + t.name + '"? Any open order on it will be cancelled.')) return;
        try { await api('/tables/' + t.id + '/free/', { method: 'POST' }); load(); }
        catch (e) { alert(e.message); }
      };

      const addUser = async () => {
        const nm = uName.trim(); if (!nm || !uPass) return;
        try { await api('/users-admin/', { method: 'POST', body: { username: nm, password: uPass, role: uRole } });
          setUName(''); setUPass(''); setURole('cashier'); load(); }
        catch (e) { alert(e.message); }
      };
      const saveUser = async (u, patch) => {
        try { await api('/users-admin/' + u.id + '/', { method: 'PATCH', body: patch }); load(); }
        catch (e) { alert(e.message); }
      };
      const deleteUser = async (u) => {
        if (!confirm('Remove user "' + u.username + '"?')) return;
        try { await api('/users-admin/' + u.id + '/', { method: 'DELETE' }); load(); }
        catch (e) { alert(e.message); }
      };
      const savePayments = async () => {
        try { await api('/tenant/', { method: 'PATCH', body: { upi_vpa: vpa.trim(), upi_payee_name: payee.trim(), whatsapp_number: wa.trim() } }); alert('Payment settings saved.'); }
        catch (e) { alert(e.message); }
      };
      const saveTax = async () => {
        try { await api('/tenant/', { method: 'PATCH', body: { gst_enabled: gstEnabled, default_gst_rate: gstRate === '' ? 0 : gstRate } }); alert('Tax settings saved.'); }
        catch (e) { alert(e.message); }
      };

      if (loading) return html`<div class="center-msg">Loading…</div>`;
      const cardStyle = { background: 'var(--surface)', borderRadius: 'var(--radius)', boxShadow: 'var(--shadow)', overflow: 'hidden', marginBottom: '16px' };
      const headStyle = { display: 'flex', alignItems: 'center', padding: '12px 14px', borderBottom: '1px solid var(--line)' };
      const inp = { padding: '9px 11px', border: '1px solid var(--line)', borderRadius: '8px' };
