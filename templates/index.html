            </div>
            <div style=${{ padding: '14px' }}>
              <p style=${{ margin: '0 0 12px', color: 'var(--ink-soft)', fontSize: '13px' }}>
                Enter your UPI ID — a scan-to-pay QR then shows on the pay screen automatically (customer scans & pays; you tap Confirm once the money lands; no fees, no gateway). The WhatsApp number is shown on bills you send to customers.</p>
              <div style=${{ display: 'flex', gap: '10px', flexWrap: 'wrap', alignItems: 'flex-end' }}>
                <label style=${{ fontSize: '12px', color: 'var(--ink-soft)', flex: 1, minWidth: '210px' }}>UPI ID (VPA)<br/>
                  <input placeholder="e.g. cafegopala@okhdfcbank" value=${vpa} onChange=${e => setVpa(e.target.value)} style=${{ ...inp, width: '100%' }} /></label>
                <label style=${{ fontSize: '12px', color: 'var(--ink-soft)', flex: 1, minWidth: '170px' }}>Payee name shown<br/>
                  <input placeholder="e.g. Cafe Gopala" value=${payee} onChange=${e => setPayee(e.target.value)} style=${{ ...inp, width: '100%' }} /></label>
                <label style=${{ fontSize: '12px', color: 'var(--ink-soft)', flex: 1, minWidth: '170px' }}>WhatsApp number<br/>
                  <input placeholder="e.g. 9876543210" inputmode="tel" value=${wa} onChange=${e => setWa(e.target.value)} style=${{ ...inp, width: '100%' }} /></label>
                <button class="btn sm" onClick=${savePayments}>Save</button>
              </div>
            </div>
          </div>

          <div style=${cardStyle}>
            <div style=${headStyle}>
              <b style=${{ flex: 1, color: 'var(--brand-dark)', fontSize: '15px' }}>Tax / GST</b>
            </div>
            <div style=${{ padding: '14px' }}>
              <label style=${{ display: 'flex', alignItems: 'center', gap: '8px', fontSize: '14px', marginBottom: '10px' }}>
                <input type="checkbox" checked=${gstEnabled} onChange=${e => setGstEnabled(e.target.checked)} />
                Charge GST on bills</label>
              <p style=${{ margin: '0 0 12px', color: 'var(--ink-soft)', fontSize: '13px' }}>
                Turn this off for a small eatery with no GST — bills then show just the total, no tax line. When on, each menu item can carry its own rate; the default below is used for new items.</p>
              <div style=${{ display: 'flex', gap: '10px', alignItems: 'flex-end' }}>
                <label style=${{ fontSize: '12px', color: 'var(--ink-soft)' }}>Default GST %<br/>
                  <input value=${gstRate} inputmode="decimal" disabled=${!gstEnabled} onChange=${e => setGstRate(e.target.value)} style=${{ ...inp, width: '110px' }} /></label>
                <button class="btn sm" onClick=${saveTax}>Save</button>
              </div>
            </div>
          </div>

          <div style=${cardStyle}>
            <div style=${headStyle}>
              <b style=${{ flex: 1, color: 'var(--brand-dark)', fontSize: '15px' }}>Dine-in tables</b>
              <span style=${{ color: 'var(--ink-soft)', fontSize: '13px' }}>${tables.length} table${tables.length === 1 ? '' : 's'}</span>
            </div>
            ${tables.length === 0 && html`<div style=${{ padding: '12px 14px', color: 'var(--ink-soft)', fontSize: '14px' }}>No tables yet. Add one below.</div>`}
            ${tables.map(t => html`<${TableRow} key=${t.id} t=${t} onSave=${saveTable} onDelete=${deleteTable} onFree=${freeTableRow} />`)}
            <div style=${{ display: 'flex', gap: '8px', padding: '12px 14px', alignItems: 'center' }}>
              <input placeholder="Table name (e.g. T7)" value=${tName} onChange=${e => setTName(e.target.value)}
                onKeyDown=${e => e.key === 'Enter' && addTable()} style=${{ ...inp, flex: 1 }} />
              <input type="number" min="1" placeholder="Seats" value=${tSeats} onChange=${e => setTSeats(e.target.value)} style=${{ ...inp, width: '90px' }} />
              <button class="btn sm" onClick=${addTable}>Add table</button>
            </div>
          </div>

          <div style=${cardStyle}>
            <div style=${headStyle}>
              <b style=${{ flex: 1, color: 'var(--brand-dark)', fontSize: '15px' }}>Staff & logins</b>
              <span style=${{ color: 'var(--ink-soft)', fontSize: '13px' }}>${users.length} user${users.length === 1 ? '' : 's'}</span>
            </div>
            ${users.map(u => html`<${UserRow} key=${u.id} u=${u} onSave=${saveUser} onDelete=${deleteUser} />`)}
            <div style=${{ display: 'flex', gap: '8px', padding: '12px 14px', alignItems: 'center', flexWrap: 'wrap' }}>
              <input placeholder="Username" value=${uName} onChange=${e => setUName(e.target.value)} style=${{ ...inp, flex: 1, minWidth: '120px' }} />
              <input type="password" placeholder="Password" value=${uPass} onChange=${e => setUPass(e.target.value)} style=${{ ...inp, width: '150px' }} />
              <select value=${uRole} onChange=${e => setURole(e.target.value)} style=${{ ...inp, background: 'var(--surface)' }}>
                ${ROLE_OPTS.map(([v, l]) => html`<option key=${v} value=${v}>${l}</option>`)}
              </select>
              <button class="btn sm" onClick=${addUser}>Add user</button>
            </div>
          </div>

          <p style=${{ color: 'var(--ink-soft)', fontSize: '13px' }}>
            A table with an open order can't be deleted — settle it, or use Free to clear a stuck one.
            Cashiers & waiters can take orders & payment; kitchen sees the KDS only. Usernames must be
            unique. (UPI & branding settings will live here too.)</p>
        </div>`;
    }

    // ---------------- Attendance & payroll ----------------
    const fmtTime = (iso) => { try { return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); } catch { return ''; } };
    const todayStr = () => { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); };
    const monthStartStr = () => { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-01'; };

    function PinModal({ emp, onClose, onPunch }) {
      const [pin, setPin] = useState('');
      const [busy, setBusy] = useState(false); const [err, setErr] = useState('');
      const go = async () => {
        setErr(''); setBusy(true);
        try { await onPunch(emp, pin); } catch (e) { setErr(e.message); setBusy(false); }
      };
      return html`
        <div class="modal-bg" onClick=${onClose}>
          <div class="modal" onClick=${e => e.stopPropagation()} style=${{ maxWidth: '300px' }}>
            <h3 style=${{ margin: '0 0 4px' }}>${emp.clocked_in ? 'Clock out' : 'Clock in'}</h3>
            <p style=${{ color: 'var(--ink-soft)', fontSize: '14px', margin: '0 0 14px' }}>${emp.username}</p>
            ${err && html`<div class="err">${err}</div>`}
            <input type="password" inputmode="numeric" placeholder="PIN" value=${pin} autoFocus
              onChange=${e => setPin(e.target.value)} onKeyDown=${e => e.key === 'Enter' && pin && go()}
              style=${{ width: '100%', padding: '12px', border: '1px solid var(--line)', borderRadius: '10px', textAlign: 'center', fontSize: '22px', letterSpacing: '6px' }} />
            <div style=${{ display: 'flex', gap: '8px', marginTop: '14px' }}>
              <button class="btn ghost" style=${{ flex: 1 }} onClick=${onClose}>Cancel</button>
              <button class="btn accent" style=${{ flex: 2 }} disabled=${busy || !pin} onClick=${go}>
                ${busy ? '…' : (emp.clocked_in ? 'Clock out' : 'Clock in')}</button>
            </div>
          </div>
        </div>`;
    }

    function Attendance({ auth }) {
      const isManager = auth.role === 'owner' || auth.role === 'admin';
      const [view, setView] = useState('clock');
      const [emps, setEmps] = useState([]);
      const [pinFor, setPinFor] = useState(null);
      const [toast, setToast] = useState('');

      const loadEmps = useCallback(async () => {
        try { setEmps(await api('/attendance/employees/') || []); } catch (e) { /* keep last */ }
      }, []);
      useEffect(() => { loadEmps(); const t = setInterval(loadEmps, 20000); return () => clearInterval(t); }, [loadEmps]);

      const punch = async (emp, pin) => {
        const r = await api('/attendance/punch/', { method: 'POST', body: { employee_id: emp.id, pin } });
        setPinFor(null);
        const rec = r.record || {};
        const t = r.action === 'in' ? rec.clock_in : rec.clock_out;
        setToast((r.action === 'in' ? 'Clocked in' : 'Clocked out') + (t ? ' at ' + fmtTime(t) : ''));
        setTimeout(() => setToast(''), 2600);
        loadEmps();
      };

      return html`
        <div style=${{ padding: '18px', maxWidth: '860px', margin: '0 auto', height: '100%', overflowY: 'auto' }}>
          <div style=${{ display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '16px' }}>
            <h2 style=${{ margin: 0, flex: 1 }}>Attendance</h2>
            ${isManager && html`
              <div class="cat-tabs" style=${{ overflow: 'visible' }}>
                <button class=${'chip ' + (view === 'clock' ? 'on' : '')} onClick=${() => setView('clock')}>Clock</button>
                <button class=${'chip ' + (view === 'payroll' ? 'on' : '')} onClick=${() => setView('payroll')}>Payroll</button>
              </div>`}
          </div>

          ${view === 'clock' && html`
            <p style=${{ color: 'var(--ink-soft)', fontSize: '13px', marginTop: 0 }}>
              Tap your name and enter your PIN to clock in or out. The time is recorded by the system, not typed in.</p>
            ${emps.length === 0 && html`<div class="empty">No staff yet. Add staff in Settings and set a PIN for each (Pay/PIN button).</div>`}
            <div style=${{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(190px, 1fr))', gap: '10px' }}>
              ${emps.map(e => html`
                <button key=${e.id} onClick=${() => e.has_pin ? setPinFor(e) : alert('No PIN set for ' + e.username + '. Set one in Settings → Pay/PIN.')}
                  style=${{ textAlign: 'left', padding: '14px', borderRadius: '12px', border: '1px solid ' + (e.clocked_in ? 'var(--ok)' : 'var(--line)'), background: e.clocked_in ? '#e9f6f0' : 'var(--surface)' }}>
                  <div style=${{ fontWeight: 700, fontSize: '15px' }}>${e.username}</div>
                  <div style=${{ fontSize: '12px', color: 'var(--ink-soft)', textTransform: 'capitalize' }}>${e.role}${e.has_pin ? '' : ' · no PIN'}</div>
                  <div style=${{ marginTop: '8px', fontSize: '13px', fontWeight: 700, color: e.clocked_in ? 'var(--ok)' : 'var(--ink-soft)' }}>
                    ${e.clocked_in ? '● In — tap to clock out' : '○ Out — tap to clock in'}</div>
                </button>`)}
            </div>`}

          ${view === 'payroll' && isManager && html`<${Payroll} />`}

          ${pinFor && html`<${PinModal} emp=${pinFor} onClose=${() => setPinFor(null)} onPunch=${punch} />`}
          ${toast && html`<div style=${{ position: 'fixed', bottom: '24px', left: '50%', transform: 'translateX(-50%)', background: 'var(--ink)', color: '#fff', padding: '12px 20px', borderRadius: '10px', fontWeight: 600, zIndex: 60 }}>${toast}</div>`}
        </div>`;
    }

    function Payroll() {
      const [from, setFrom] = useState(monthStartStr());
      const [to, setTo] = useState(todayStr());
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(false);
      const load = async () => {
        setLoading(true);
        try { setData(await api('/attendance/summary/?from=' + from + '&to=' + to)); }
        catch (e) { alert(e.message); } finally { setLoading(false); }
      };
      useEffect(() => { load(); }, []);
      const rows = data ? data.rows : [];
      const totalPay = rows.reduce((s, r) => s + Number(r.pay || 0), 0);
      const inp = { padding: '8px 10px', border: '1px solid var(--line)', borderRadius: '8px' };
      return html`
        <div>
          <div style=${{ display: 'flex', gap: '8px', alignItems: 'flex-end', flexWrap: 'wrap', marginBottom: '14px' }}>
            <label style=${{ fontSize: '12px', color: 'var(--ink-soft)' }}>From<br/>
              <input type="date" value=${from} onChange=${e => setFrom(e.target.value)} style=${inp} /></label>
            <label style=${{ fontSize: '12px', color: 'var(--ink-soft)' }}>To<br/>
              <input type="date" value=${to} onChange=${e => setTo(e.target.value)} style=${inp} /></label>
            <button class="btn sm" onClick=${load}>${loading ? 'Loading…' : 'Calculate'}</button>
          </div>
          ${rows.length === 0 && html`<div class="empty">No completed attendance in this range.</div>`}
          ${rows.length > 0 && html`
            <div style=${{ background: 'var(--surface)', borderRadius: 'var(--radius)', boxShadow: 'var(--shadow)', overflow: 'hidden' }}>
              <div style=${{ display: 'flex', padding: '10px 14px', borderBottom: '1px solid var(--line)', fontSize: '12px', color: 'var(--ink-soft)', textTransform: 'uppercase', letterSpacing: '.03em' }}>
                <span style=${{ flex: 2 }}>Staff</span><span style=${{ flex: 1 }}>Rate</span><span style=${{ width: '64px', textAlign: 'right' }}>Hours</span><span style=${{ width: '52px', textAlign: 'right' }}>Days</span><span style=${{ width: '90px', textAlign: 'right' }}>Pay</span>
              </div>
              ${rows.map(r => html`
                <div key=${r.employee} style=${{ display: 'flex', alignItems: 'center', padding: '10px 14px', borderBottom: '1px solid var(--line)' }}>
                  <span style=${{ flex: 2, fontWeight: 600 }}>${r.username}</span>
                  <span style=${{ flex: 1, fontSize: '13px', color: 'var(--ink-soft)', textTransform: 'capitalize' }}>${r.wage_type} · ${rupee(r.wage_rate)}</span>
                  <span style=${{ width: '64px', textAlign: 'right' }}>${Number(r.hours).toFixed(1)}</span>
                  <span style=${{ width: '52px', textAlign: 'right' }}>${r.days}</span>
                  <span style=${{ width: '90px', textAlign: 'right', fontWeight: 700 }}>${rupee(r.pay)}</span>
                </div>`)}
              <div style=${{ display: 'flex', padding: '12px 14px', fontWeight: 800 }}>
                <span style=${{ flex: 1 }}>Total</span><span>${rupee(totalPay)}</span>
              </div>
            </div>
            <p style=${{ color: 'var(--ink-soft)', fontSize: '12px', marginTop: '10px' }}>
              Hourly = hours × rate · Daily = days present × rate · Monthly = fixed salary (shown as-is).
              Only completed (clocked-out) sessions count toward hours. Set each person's wage in Settings → Pay/PIN.</p>`}
        </div>`;
    }

    // ---------------- Shell + routing ----------------
    const TABS = {
      cashier:  { label: 'Cashier',  comp: Cashier, roles: ['owner', 'admin', 'cashier', 'waiter'] },
      kitchen:  { label: 'Kitchen',  comp: Kitchen, roles: ['owner', 'admin', 'kitchen'] },
      menu:     { label: 'Menu',     comp: MenuManager, roles: ['owner', 'admin'] },
      attendance: { label: 'Attendance', comp: Attendance, roles: ['owner', 'admin', 'cashier', 'kitchen', 'waiter'] },
      settings: { label: 'Settings', comp: Settings, roles: ['owner', 'admin'] },
      home:     { label: 'Home',     comp: Home,    roles: ['owner', 'admin', 'cashier', 'kitchen', 'waiter'] },
    };

    function App() {
      const [auth, setAuth] = useState(loadAuth());
      const allowed = auth ? Object.entries(TABS).filter(([, t]) => t.roles.includes(auth.role)).map(([k]) => k) : [];
      const first = auth ? (auth.role === 'kitchen' ? 'kitchen' : 'cashier') : null;
      const [tab, setTab] = useState(first);

      useEffect(() => { if (auth && !allowed.includes(tab)) setTab(first); }, [auth]);

      if (!auth) return html`<${Login} onLogin=${(a) => { setAuth(a); setTab(a.role === 'kitchen' ? 'kitchen' : 'cashier'); }} />`;

      const Active = (TABS[tab] || TABS[first]).comp;
      return html`
        <div class="shell">
          <div class="topbar">
            <span class="brand">${auth.tenant ? auth.tenant.name : 'POS'}</span>
            <span class="tenant">POS</span>
            <div class="spacer"></div>
            <div class="nav">
              ${allowed.map(k => html`<button key=${k} class=${tab === k ? 'active' : ''} onClick=${() => setTab(k)}>${TABS[k].label}</button>`)}
            </div>
            <div class="who"><b>${auth.role}</b>${auth.username}</div>
            <button class="btn ghost sm" onClick=${() => { clearAuth(); setAuth(null); }}>Logout</button>
          </div>
          <div class="main"><${Active} auth=${auth} /></div>
        </div>`;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(html`<${App} />`);
  </script>
</body>
</html>
