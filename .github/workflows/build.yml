name: build-and-push

# Builds the guhya-pos API image and pushes it to GitHub Container Registry,
# exactly like careai-api / docsign-api. The server then just PULLS this image.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/pravreddy/guhya-pos-api:latest
            ghcr.io/pravreddy/guhya-pos-api:${{ github.sha }}
