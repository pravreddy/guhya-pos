name: guhya-pos

# Base infra: Postgres, Redis, Caddy (auto-HTTPS). Same shape as care-ai.
services:
  postgres:
    image: postgres:16
    container_name: guhya-pos-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-guhya-pos}
      POSTGRES_USER: ${POSTGRES_USER:-guhya-pos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-guhya-pos}
    volumes:
      - guhya-pos-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-guhya-pos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [guhya-net]

  redis:
    image: redis:7-alpine
    container_name: guhya-pos-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [guhya-net]

  caddy:
    image: caddy:2-alpine
    container_name: guhya-pos-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./active_guhya_pos.conf:/etc/caddy/active_guhya_pos.conf
      - ./sites:/srv:ro
      - caddy-data:/data
      - caddy-config:/config
    networks: [guhya-net]

volumes:
  guhya-pos-pgdata:
  caddy-data:
  caddy-config:

networks:
  guhya-net:
    name: guhya-net
