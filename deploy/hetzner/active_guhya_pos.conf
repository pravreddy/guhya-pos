# Blue/green switch for guhya-pos (same pattern as care-ai active_docsign.conf).
# deploy.sh rewrites the colour below and reloads Caddy.
handle /api/* { reverse_proxy guhya-pos-api-blue:8000 }
handle /admin/* { reverse_proxy guhya-pos-api-blue:8000 }
handle /static/* { reverse_proxy guhya-pos-api-blue:8000 }
handle /media/* { reverse_proxy guhya-pos-api-blue:8000 }
handle /ping* { reverse_proxy guhya-pos-api-blue:8000 }
# default → React frontend once it exists; for now → API so /admin works
handle { reverse_proxy guhya-pos-api-blue:8000 }
