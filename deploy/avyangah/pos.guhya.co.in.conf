# pos.guhya.co.in — guhya-pos (POS). Reverse-proxy to the API container.
# Lives on the server at ~/careai/site-confs/pos.guhya.co.in.conf
# (nginx already includes conf.d/sites/*.conf, so a reload picks it up).
#
# Blue/green: flip the `set $guhya_backend` line blue<->green and reload.
# Single container serves API + admin + static (WhiteNoise), so one proxy block.

server {
    listen 80;
    server_name pos.guhya.co.in;
    location /.well-known/acme-challenge/ { root /var/www/certbot; allow all; default_type "text/plain"; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name pos.guhya.co.in;

    # --- blue/green switch (flip + reload to swap colours) ---
    set $guhya_backend "guhya-pos-api-blue:8000";

    ssl_certificate     /etc/nginx/ssl/pos.guhya.co.in-fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/pos.guhya.co.in-privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 25M;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location ~ /\.(?!well-known) { deny all; access_log off; log_not_found off; }

    location / {
        proxy_pass http://$guhya_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        # (kitchen-display websocket headers get added here when we build the KDS)
    }
}
