name: guhya-pos

# App overlay: two API colours (blue/green). deploy.sh runs one at a time and
# flips Caddy between them. Build locally, or pull from ghcr like care-ai.
services:
  guhya-pos-api-blue:
    image: ghcr.io/${GITHUB_USER:-yourname}/guhya-pos-api:latest
    build:
      context: ../..
    container_name: guhya-pos-api-blue
    restart: unless-stopped
    env_file: .env
    environment:
      - DEBUG=0
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks: [guhya-net]

  guhya-pos-api-green:
    image: ghcr.io/${GITHUB_USER:-yourname}/guhya-pos-api:latest
    build:
      context: ../..
    container_name: guhya-pos-api-green
    restart: unless-stopped
    env_file: .env
    environment:
      - DEBUG=0
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks: [guhya-net]
